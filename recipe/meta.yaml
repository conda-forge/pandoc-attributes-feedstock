{% set name = "pandoc-attributes" %}
{% set version = "0.1.7" %}
{% set sha256 = "69221502dac74f5df1317011ce62c85a83eef5da3b71c63b1908e98224304a8c" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - pandocattributes

about:
  home: http://github.com/aaren/pandoc-attributes
  license: MIT
  license_family: MIT
  summary: 'A simple parser / emitter for pandoc block attributes, intended for use with pandocfilters.'

extra:
  recipe-maintainers:
    - ericmjl
    - mdehollander
